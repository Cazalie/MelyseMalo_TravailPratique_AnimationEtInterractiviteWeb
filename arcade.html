    <body>
        <div class="accueil">
            <picture>
                <source 
                    media="(min-width: 1200px)" 
                    srcset="ressources/images/accueilGrand.png">

                    src="ressources/images/accueilPetit.png"
                    alt="accueil"
                >
            </picture>
            <h1 class="titre-dactylo">Arcade</h1>
        </div>
        <input type="checkbox" id="theme-toggle" class="theme-toggle">
        <div class="site cache">
            <a id="fleche" href="#top"><span></span></a>
            <header>
                <!--Taille 768px 1200px 1920px-->
                <picture>
                    <source 
                        media="(min-width: 1920px)" 
                        srcset="ressources/images/banniere1_grand_arcade.png">
                    <source 
                        media="(min-width: 1200px)" 
                        srcset="ressources/images/banniere2_bureau_arcade.png">
                    <source 
                        media="(min-width: 768px)" 
                        srcset="ressources/images/banniere3_tablette_arcade.png">
                    <img 
                        src="ressources/images/banniere4_mobile_arcade.png"
                        style="width: 100vw; height: auto;"
                        alt="banniere"
                        id="top"
                    >
                </picture>
                <div id="navigation">
                    <input id="nav-toggle" class="nav-toggle" type="checkbox">
                    <label for="nav-toggle" class="burger material-icons">
                        <span class="material-icons"></span>
                        <span class="material-icons"></span>
                        <span class="material-icons"></span>
                    </label>
                    <nav class="nav-principale partie">
                        <div>
                            <a href="index.html#aPropos"aria-current="page">À propos</a>

                        </div>
                            <a href="index.html" class="bouton">Accueil</a>
                        <label for="theme-toggle" class="bouton-theme">
                            <span id="boutonTheme"></span>
                        </label>
                    </nav>
                </div>
            </header>
            <main class="contenu-principal partie">
                <section class="arcade">
                    <h1>Arcade de Jeux</h1>
                    <div id="recherche">
                        <label for="motCle">Rechercher un jeu :<input type="text" id="motCle" placeholder="Entrez un mot-clé"></label>
                        <select id="age">
                            <option value="">Tous les âges</option>
                            <option value="2">2 ans</option>
                            <option value="3">3 ans</option>
                            <option value="4">4 ans</option>
                            <option value="5">5 ans</option>
                            <option value="6">6 ans</option>
                            <option value="7">7 ans</option>
                            <option value="8">8 ans</option>
                        </select>
                        <a id="btnRecherche"></a>
                    </div>
                    <div class="grille"></div>
                    <template id="gabaritJeu">
                        <article class="tuile">
                            <figure>
                                <img src="" class="imageJeu" alt="">
                                <figcaption>
                                    <h3 class="titreJeu"></h3>
                                    <p class="publicJeu"></p>
                                </figcaption>
                            </figure>
                            <div class="details">
                                <ul class="listeTagJeu">
                                    <li class="tagJeu"></li>
                                </ul>
                                <p class="descriptionJeu"></p>
                                <p class="developpeurJeu">Développer par: </p>
                                <a href="" target="_blank" class="urlJeu">Clique ici pour jouer !</a>
                            </div>
                        </article>
                    </template>
                </section>
            <footer class="partie">
                <div class="contact">
                    <a href="https://h26-2j2.github.io/MelyseMalo_TravailPratique/" target="_blank">

                    <div class="reseaux">
                        <a href="https://www.behance.net/MelyseLarissaMalo" target="_blank">

                        </a>

                <div class="ref">
                    <a href="https://www.cmaisonneuve.qc.ca/" target="_blank">

                    <div>
